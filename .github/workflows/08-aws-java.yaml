name: 08-aws-java

on:
  workflow_dispatch

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: itc-org/infra-templates/.github/workflows/aws-deploy-template.yml@main
    with:
      workspace: java
      role_arn: arn:aws:iam::160198385987:role/github-actions-terraform
      aws_region: eu-west-2

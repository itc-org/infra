name: 08-aws-java

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply (otherwise plan only)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/aws-deploy-template.yml
    with:
      workspace: java
      aws_region: eu-west-2
      role_arn: arn:aws:iam::160198385987:role/github-actions-terraform
      apply: ${{ inputs.apply }}

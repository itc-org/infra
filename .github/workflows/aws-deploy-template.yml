name: aws-deploy-template

# Reusable workflow. Each per-account caller (06-aws-bd, 07-aws-ds, 08-aws-java)
# passes its workspace + the OIDC role ARN of that account.

on:
  workflow_call:
    inputs:
      workspace:
        description: "Terraform workspace / env file name (bd, ds, java)"
        required: true
        type: string
      role_arn:
        description: "IAM role ARN to assume via GitHub OIDC in the target account"
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: eu-west-2
      apply:
        description: "Run terraform apply (false = plan only)"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write   # REQUIRED for OIDC token
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aws
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Verify account
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="envs/${{ inputs.workspace }}.s3.tfbackend"

      - name: Select workspace
        run: terraform workspace select "${{ inputs.workspace }}" || terraform workspace new "${{ inputs.workspace }}"

      - name: Terraform Plan
        run: terraform plan -var-file="envs/${{ inputs.workspace }}.tfvars"

      - name: Terraform Apply
        if: ${{ inputs.apply }}
        run: terraform apply -auto-approve -var-file="envs/${{ inputs.workspace }}.tfvars"

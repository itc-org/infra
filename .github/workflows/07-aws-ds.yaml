name: 07-aws-ds

on:
  workflow_dispatch

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: itc-org/infra-templates/.github/workflows/aws-deploy-template.yml@main
    with:
      workspace: ds
      role_arn: arn:aws:iam::666127452756:role/github-actions-terraform
      aws_region: eu-west-2

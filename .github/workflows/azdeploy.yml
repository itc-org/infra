name: Deploy Azure
run-name: Deploying to ${{ inputs.workspace }}

on:
  workflow_dispatch:
    inputs:
      databricks:
        description: 'Deploy Databricks'
        type: boolean
        default: false
      datafactory:
        description: 'Deploy Datafactory'
        type: boolean
        default: false
      synapse:
        description: 'Deploy Synapse'
        type: boolean
        default: false
      functions:
        description: 'Deploy Functions'
        type: boolean
        default: false
      cosmosdb:
        description: 'Deploy CosmosDB'
        type: boolean
        default: false
      eventhub:
        description: 'Deploy EventHub'
        type: boolean
        default: false
      vm:
        description: 'Deploy VM'
        type: boolean
        default: false
      aks:
        description: 'Deploy AKS'
        type: boolean
        default: false
      keyvault:
        description: 'Deploy Key Vault'
        type: boolean
        default: false
      storage-datalake:
        description: 'Deploy Storage Datalake'
        type: boolean
        default: false
      workspace:
        description: 'Workspace'
        required: true
        type: choice
        options:   
          - java     
          - ds
          - do
          - bd
          - pmo

permissions:
  contents: read

########################################
# JOB 1 → PLAN
########################################
jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: azure

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Select or Create Workspace
        run: |
          terraform workspace select ${{ inputs.workspace }} || \
          terraform workspace new ${{ inputs.workspace }}

      - name: Build services list
        id: build
        run: |
          SERVICES="["
          
          [ "${{ inputs.databricks }}" == "true" ] && SERVICES="$SERVICES\"databricks\","
          [ "${{ inputs.datafactory }}" == "true" ] && SERVICES="$SERVICES\"datafactory\","
          [ "${{ inputs.synapse }}" == "true" ] && SERVICES="$SERVICES\"synapse\","
          [ "${{ inputs.functions }}" == "true" ] && SERVICES="$SERVICES\"functions\","
          [ "${{ inputs.cosmosdb }}" == "true" ] && SERVICES="$SERVICES\"cosmosdb\","
          [ "${{ inputs.eventhub }}" == "true" ] && SERVICES="$SERVICES\"eventhub\","
          [ "${{ inputs.vm }}" == "true" ] && SERVICES="$SERVICES\"vm\","
          [ "${{ inputs.aks }}" == "true" ] && SERVICES="$SERVICES\"aks\","
          [ "${{ inputs.keyvault }}" == "true" ] && SERVICES="$SERVICES\"keyvault\","
          [ "${{ inputs.storage-datalake }}" == "true" ] && SERVICES="$SERVICES\"storage-datalake\","

          SERVICES="${SERVICES%,}]"

          if [ "$SERVICES" == "[" ]; then
            echo "Error: No services selected."
            exit 1
          fi

          echo "services=$SERVICES" >> $GITHUB_OUTPUT

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var='services_to_deploy=${{ steps.build.outputs.services }}' -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: azure/tfplan

########################################
# JOB 2 → APPLY (WITH APPROVAL)
########################################
  terraform-apply:
    needs: terraform-plan
    runs-on: ubuntu-latest

    environment: tf-approve  

    defaults:
      run:
        working-directory: azure

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Select or Create Workspace
        run: |
          terraform workspace select ${{ inputs.workspace }} || \
          terraform workspace new ${{ inputs.workspace }}

      - name: Download Plan
        uses: actions/download-artifact@v3
        with:
          name: tfplan
          path: azure

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan